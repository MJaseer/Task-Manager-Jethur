@if (task(); as t) {
<div class="max-w-4xl mx-auto p-8">
  <header class="mb-8">
    <h1 class="text-3xl font-black text-surface-900 mb-2">{{ t.title }}</h1>
    <p class="text-surface-500">Task ID: {{ t.id }}</p>
  </header>

  <section class="mb-10">
    <div class="flex justify-between items-center mb-4">
      <h3 class="text-lg font-bold">Description</h3>
      <p-button 
        label="Save Changes" 
        icon="pi pi-check" 
        size="small" 
        severity="success"
        (onClick)="saveDescription(t)" />
    </div>
    <p-editor [(ngModel)]="t.description" [style]="{ height: '250px' }">
      <ng-template pTemplate="header">
        <span class="ql-formats">
          <button type="button" class="ql-bold" aria-label="Bold"></button>
          <button type="button" class="ql-italic" aria-label="Italic"></button>
          <button type="button" class="ql-underline" aria-label="Underline"></button>
        </span>
      </ng-template>
    </p-editor>
  </section>

  <section class="border-t border-surface-200 pt-8">
    <h3 class="text-xl font-bold mb-6 italic">Discussion ({{ t.comments.length }})</h3>

    <div class="mb-8 bg-surface-50 p-4 rounded-xl border border-surface-200 shadow-sm">
      <textarea 
        pTextarea 
        [(ngModel)]="newCommentContent"
        placeholder="Start a new conversation..." 
        [autoResize]="true"
        rows="3"
        class="w-full text-sm p-3 border border-surface-300 rounded-lg focus:border-primary mb-3">
      </textarea>
      <div class="flex justify-end">
        <p-button 
          label="Post Comment" 
          icon="pi pi-send" 
          size="small"
          [disabled]="!newCommentContent().trim()"
          (onClick)="submitTopLevelComment()" />
      </div>
    </div>

    <div class="flex flex-col gap-6">
      @for (c of t.comments; track c.id) {
        <app-comment-thread [comment]="c" [taskId]="t.id" />
      } @empty {
        <div class="text-center p-10 bg-surface-50 rounded-lg text-surface-400 border border-dashed border-surface-300">
          No comments yet. Start the conversation!
        </div>
      }
    </div>
  </section>
</div>
}
