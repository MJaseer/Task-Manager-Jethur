<div class="flex flex-col gap-4 mt-4">
  <div class="flex gap-3">
    <div class="flex flex-col items-center">
      <p-avatar [label]="comment().author[0]" shape="circle" styleClass="bg-primary text-white" />
      @if (comment().replies.length > 0 || isReplying()) {
        <div class="w-px h-full bg-surface-200 mt-2"></div>
      }
    </div>

    <div class="flex-1 bg-surface-50 p-4 rounded-xl border border-surface-100 shadow-sm">
      <div class="flex justify-between items-center mb-2">
        <span class="font-bold text-sm text-surface-900">{{ comment().author }}</span>
        <span class="text-xs text-surface-500">{{ comment().createdAt | date:'short' }}</span>
      </div>
      <div class="text-surface-700 text-sm leading-relaxed" [innerHTML]="comment().content"></div>
      
      <div class="mt-2">
        <p-button 
          [label]="isReplying() ? 'Cancel' : 'Reply'" 
          [icon]="isReplying() ? 'pi pi-times' : 'pi pi-reply'" 
          [text]="true" 
          size="small" 
          (onClick)="toggleReply()" />
      </div>

      @if (isReplying()) {
        <div class="mt-3 flex flex-col gap-2 transition-all duration-200">
          <textarea 
            pInputTextarea 
            [(ngModel)]="replyContent"
            [autoResize]="true"
            rows="2"
            placeholder="Write a reply..."
            class="w-full text-sm p-2 border border-surface-300 rounded-md focus:border-primary">
          </textarea>
          <div class="flex justify-end">
            <p-button 
              label="Submit" 
              size="small" 
              [disabled]="!replyContent().trim()"
              (onClick)="submitReply()" />
          </div>
        </div>
      }
    </div>
  </div>

  @if (comment().replies.length > 0) {
    <div class="pl-6 md:pl-10 border-l border-surface-200 ml-4">
      @for (reply of comment().replies; track reply.id) {
        <app-comment-thread [comment]="reply" [taskId]="taskId()" />
      }
    </div>
  }
</div>
